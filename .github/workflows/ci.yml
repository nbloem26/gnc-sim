name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint + type-check (C++ / Python / web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v5
        with: { node-version: '20' }

      # --- Python: ruff (lint + format) and mypy (types) ---
      - name: Install Python linters
        run: pip install ruff==0.15.17 mypy==2.1.0 numpy scipy pandas
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy type-check
        run: mypy

      # --- C++: clang-format (pinned to match the version contributors run) ---
      - name: Install clang-format
        run: pip install clang-format==22.1.5
      - name: Clang-format check
        run: |
          mapfile -t files < <(find core apps bindings \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) -not -path '*/build*/*')
          clang-format --dry-run --Werror "${files[@]}"

      # --- Web: ESLint + TypeScript ---
      - name: Web lint + type-check
        run: |
          cd web
          npm ci
          npm run lint
          npx tsc --noEmit

  native:
    name: Native build + C++ tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential
      - name: Build + test (CTest)
        run: |
          cmake -S . -B build-native -DCMAKE_BUILD_TYPE=Release
          cmake --build build-native -j"$(nproc)"
          ctest --test-dir build-native --output-on-failure
      - name: Upload native CLI
        uses: actions/upload-artifact@v5
        with:
          name: gncsim-native
          path: build-native/apps/cli/gncsim

  python:
    name: Python rigor (Allan variance + validation)
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - name: Install deps
        run: pip install -r postproc/requirements.txt
      - uses: actions/download-artifact@v5
        with: { name: gncsim-native, path: build-native/apps/cli }
      - run: chmod +x build-native/apps/cli/gncsim
      - name: Sensor characterization (writes configs/sensor_params.json)
        run: python sensors/generate_imu_data.py && python sensors/fit_noise_params.py
      - name: Post-processing + validation tests
        run: python -m pytest postproc/tests -q

  python-sdk:
    name: Python SDK (pybind11) build + import + bit-for-bit test
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential
      - name: Install Python deps (pybind11 + numpy + pytest)
        run: pip install pybind11 numpy pytest
      # Build the bindings behind the opt-in flag; the compiled _gncsim lands in bindings/gncsim/.
      - name: Build Python bindings
        run: ./scripts/build-python.sh
      - name: Import the module
        run: |
          export PYTHONPATH="$PWD/bindings:${PYTHONPATH:-}"
          python -c "import gncsim; r = gncsim.run({'scenario': 'homing'}); print(sorted(r.keys())); print('series channels:', len(r['series']))"
      # Reuse the CLI built by the `native` job to assert run(cfg) matches it bit-for-bit.
      - uses: actions/download-artifact@v5
        with: { name: gncsim-native, path: build-native/apps/cli }
      - run: chmod +x build-native/apps/cli/gncsim
      - name: SDK tests (bit-for-bit vs CLI)
        run: GNCSIM_CLI="$PWD/build-native/apps/cli/gncsim" python -m pytest bindings/test_sdk.py -q

  wasm-web:
    name: WASM build + native↔WASM parity + web build
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential
      - uses: mymindstorm/setup-emsdk@v14
        with: { version: '3.1.61' }
      - name: Build WASM
        run: ./scripts/build-wasm.sh
      - uses: actions/download-artifact@v5
        with: { name: gncsim-native, path: build-native/apps/cli }
      - run: chmod +x build-native/apps/cli/gncsim
      - name: Native ↔ WASM parity check
        run: node scripts/parity-check.mjs configs/homing_3dof.json
      - uses: actions/setup-node@v5
        with: { node-version: '20' }
      - name: Build web app
        run: cd web && npm ci && npm run build
      - name: Upload web build
        uses: actions/upload-artifact@v5
        with:
          name: web-out
          path: web/out

  # --- Test-depth jobs (issue #51). All ADDITIVE: each builds the tests in a separate build dir
  # behind an opt-in CMake flag, so the default `native` job above is untouched. ---

  sanitizers:
    name: Sanitizers (ASan + UBSan CTest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential
      - name: Build tests with ASan + UBSan
        run: |
          cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=Debug \
            -DGNCSIM_SANITIZE=address,undefined
          cmake --build build-asan -j"$(nproc)"
      - name: Run CTest under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-asan --output-on-failure

  clang-tidy:
    name: clang-tidy (core + apps/cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential clang-tidy
      - name: Generate compile_commands.json
        run: cmake -S . -B build-tidy -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy
        run: |
          # Lint the natively-compiled translation units only (apps/wasm needs Emscripten headers).
          mapfile -t files < <(find core apps/cli -name '*.cpp' -not -path '*/build*/*' | sort)
          echo "Linting ${#files[@]} files"
          clang-tidy -p build-tidy --warnings-as-errors='*' "${files[@]}"

  coverage:
    name: Coverage (gcov / gcovr summary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - name: Install toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential
          pip install gcovr==7.2
      - name: Build instrumented tests
        run: |
          cmake -S . -B build-cov -DCMAKE_BUILD_TYPE=Debug -DGNCSIM_COVERAGE=ON
          cmake --build build-cov -j"$(nproc)"
      - name: Run tests
        run: ctest --test-dir build-cov --output-on-failure
      - name: Coverage summary (core/)
        run: |
          gcovr --root . --filter 'core/' --print-summary \
            --xml-pretty -o coverage.xml build-cov
      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml

  build-matrix:
    name: Build matrix (${{ matrix.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { cc: gcc, cxx: g++, apt: build-essential }
          - { cc: clang, cxx: clang++, apt: clang }
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build ${{ matrix.apt }}
      - name: Build + test with ${{ matrix.cc }}
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build-${{ matrix.cc }} -DCMAKE_BUILD_TYPE=Release
          cmake --build build-${{ matrix.cc }} -j"$(nproc)"
          ctest --test-dir build-${{ matrix.cc }} --output-on-failure

  fuzz:
    name: Config fuzzer (libFuzzer, smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Clang toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang
      - name: Build libFuzzer harness
        env: { CC: clang, CXX: clang++ }
        run: |
          cmake -S . -B build-fuzz -DCMAKE_BUILD_TYPE=Debug -DGNCSIM_FUZZ=ON \
            -DGNCSIM_BUILD_TESTS=OFF -DGNCSIM_BUILD_CLI=OFF
          cmake --build build-fuzz -j"$(nproc)" --target config_fuzzer
      - name: Fuzz briefly over the seed corpus
        run: |
          # Short, time-boxed run: replay the corpus + mutate for 60s. A crash artifact fails the job.
          ./build-fuzz/fuzz/config_fuzzer -max_total_time=60 -timeout=10 fuzz/corpus
