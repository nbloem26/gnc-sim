name: CI (self-hosted)

# The PR + push gate, running entirely on OUR self-hosted runner — no GitHub-hosted
# minutes. This is a PRIVATE repo, so the pull_request trigger is safe (only collaborators
# open PRs). The job guard keeps repo forks from trying to use a runner that isn't theirs.
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-self-hosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Full pipeline (self-hosted)
    if: github.repository == 'nbloem26/gnc-sim'
    runs-on: [self-hosted, linux, gnc-sim]
    steps:
      - uses: actions/checkout@v5

      - name: Toolchain versions
        run: |
          cmake --version | head -1
          python3 --version
          node --version

      - name: Lint + type-check + web build (C++ / Python / web)
        run: |
          python3 -m venv .venv-lint
          . .venv-lint/bin/activate
          pip install -q ruff==0.15.17 mypy==2.1.0 clang-format==22.1.5 numpy scipy pandas
          ruff check .
          ruff format --check .
          mypy
          mapfile -t files < <(find core apps bindings \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) -not -path '*/build*/*')
          clang-format --dry-run --Werror "${files[@]}"
          (cd web && npm ci && npm run lint && npx tsc --noEmit && npm run build)

      - name: Native build + CTest
        run: |
          cmake -S . -B build-native -DCMAKE_BUILD_TYPE=Release
          cmake --build build-native -j"$(nproc)"
          ctest --test-dir build-native --output-on-failure

      - name: WASM build (Emscripten)
        run: |
          if ! command -v emcmake >/dev/null 2>&1; then
            for env in "$EMSDK/emsdk_env.sh" "$HOME/emsdk/emsdk_env.sh" "/opt/emsdk/emsdk_env.sh"; do
              [ -f "$env" ] && . "$env" && break
            done
          fi
          ./scripts/build-wasm.sh

      - name: Native-WASM parity + determinism guard
        run: |
          node scripts/parity-check.mjs configs/homing_3dof.json
          node scripts/determinism-guard.mjs

      - name: Python rigor + golden + V&V matrix
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -q -r postproc/requirements.txt
          python sensors/generate_imu_data.py && python sensors/fit_noise_params.py
          python -m pytest postproc/tests -q
          (cd postproc && python -m gncpost.golden && python -m gncpost.vnv)

      - name: Large Monte Carlo campaign (push only)
        if: github.event_name != 'pull_request'
        run: ./build-native/apps/cli/gncsim --config configs/montecarlo_heavy.json --out runs/mc_heavy

      - name: Upload Monte Carlo summary
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: monte-carlo-heavy
          path: runs/mc_heavy/summary.csv
